<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        p {
            text-align: center;
            margin-top: 15px;
        }
        
        a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="card">

        <h2>Login</h2>

        <form id="loginForm">

            <input type="email" id="loginEmail" placeholder="Email" required>

            <input type="password" placeholder="Password" required>

            <button type="submit">Login</button>

            <p>
                Don't have an account?
                <a href="register.html">Register</a>
            </p>

        </form>

    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {

            e.preventDefault();

            let enteredEmail = document.getElementById("loginEmail").value;

            let savedEmail = localStorage.getItem("email");

            if (enteredEmail === savedEmail) {

                window.location.href = "dashboard.html";

            } else {

                alert("Invalid Email. Please register first.");

            }

        });
    </script>

</body>

</html>
