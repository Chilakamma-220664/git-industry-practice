<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
        }
        /* Sidebar */
        
        .sidebar {
            width: 220px;
            background: #2c3e50;
            height: 100vh;
            color: white;
            padding-top: 20px;
        }
        
        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
        }
        
        .sidebar a:hover {
            background: #34495e;
        }
        /* Main content */
        
        .main {
            flex: 1;
            background: #f4f4f4;
        }
        /* Navbar */
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #5b86e5;
            color: white;
            padding: 15px 25px;
        }
        
        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .profile img {
            width: 35px;
            border-radius: 50%;
        }
        /* Card */
        
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        
        .card {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        
        button {
            padding: 10px 20px;
            margin-top: 15px;
            background: #5b86e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        button:hover {
            background: #36d1dc;
        }
    </style>

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>Menu</h2>

        <a href="#">Home</a>
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="#" onclick="logout()">Logout</a>

    </div>

    <!-- Main Content -->

    <div class="main">

        <div class="navbar">

            <h3>Dashboard</h3>

            <div class="profile">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                <span id="username"></span>
            </div>

        </div>

        <div class="container">

            <div class="card">

                <h2>Welcome</h2>

                <p><b>Email:</b> <span id="useremail"></span></p>

                <p id="datetime"></p>

                <button onclick="logout()">Logout</button>

            </div>

        </div>

    </div>

    <script>
        let name = localStorage.getItem("name");
        let email = localStorage.getItem("email");

        document.getElementById("username").innerText = name;
        document.getElementById("useremail").innerText = email;

        function updateTime() {
            let now = new Date();
            document.getElementById("datetime").innerText = now.toLocaleString();
        }

        setInterval(updateTime, 1000);

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
